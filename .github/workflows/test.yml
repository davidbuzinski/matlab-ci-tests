on: [push]
jobs:
  build:
    name: Run MATLAB Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
      - name: Run command
        uses: matlab-actions/run-command@v2
        with:
          command: ver
