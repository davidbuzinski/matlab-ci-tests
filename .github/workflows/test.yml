on: [push]
jobs:
  build:
    name: Run MATLAB Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Simulink ;echo PWND
      - name: Run Command
        uses: matlab-actions/run-command@v3
        with:
          command: ver
